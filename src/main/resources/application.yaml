spring:
  application:
    name: springsecurity
  sql:
    init:
      mode: always


  datasource:
    url: jdbc:mysql://localhost:3307/mydb
    username: admin
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

jwt:
  public:
    key: classpath:app.pub
  private:
    key: classpath:app.key